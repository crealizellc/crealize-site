<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    (function(){
      try{
        var lang=(navigator.language||'en').toLowerCase();
        var target='/en/';
        if(lang.startsWith('zh')) target='/zh-TW/';
        else if(lang.startsWith('ja')) target='/ja/';
        location.replace(target);
      }catch(e){ location.replace('/en/'); }
    })();
  </script>
  <title>Redirecting…</title>
</head>
<body>
  <p>Redirecting to <a href="/en/">/en/</a>…</p>
</body>
</html>
