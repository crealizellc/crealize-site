<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/en/" />
    <script>
      (function(){
        try{
          var locales=["en","ja","fr","de","es","zh-TW"];var lang=(navigator.language||"").toLowerCase();
          var match=locales.find(function(l){return lang.indexOf(l.toLowerCase())===0;});
          var target=match||"en";location.replace("/"+target+"/");
        }catch(e){location.replace("/en/");}
      })();
    </script>
    <title>Redirecting...</title>
  </head>
  <body>Redirecting…</body>
</html>
